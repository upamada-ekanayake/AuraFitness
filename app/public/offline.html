<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#09090b" />
    <title>AuraFitness Offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #09090b;
        color: #f8fafc;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 20% 20%, rgba(79, 70, 229, 0.18), transparent 32%),
          radial-gradient(circle at 80% 80%, rgba(16, 185, 129, 0.14), transparent 34%),
          #09090b;
      }

      main {
        width: min(100%, 440px);
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 24px;
        background: rgba(15, 23, 42, 0.72);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
        padding: 28px;
      }

      .mark {
        width: 56px;
        height: 56px;
        border-radius: 18px;
        display: grid;
        place-items: center;
        margin-bottom: 20px;
        background: linear-gradient(135deg, #4f46e5, #10b981);
        color: #ffffff;
        font-weight: 900;
        letter-spacing: 0.02em;
      }

      h1 {
        margin: 0;
        font-size: 1.8rem;
        line-height: 1.1;
      }

      p {
        margin: 12px 0 0;
        color: #cbd5e1;
        line-height: 1.6;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">AF</div>
      <h1>AuraFitness is offline.</h1>
      <p>Your local demo data may still be available when the app loads.</p>
      <p>Cloud sync requires internet.</p>
    </main>
  </body>
</html>
